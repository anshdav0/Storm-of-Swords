server {
    # nginx listens on port 80 inside its own container (standard
    # default web server port).
    listen 80;

    location / {
        # Serves your actual built React app files.
        root /usr/share/nginx/html;
        # This line is critical for React Router-style apps: if
        # someone refreshes the page on a route like /army, nginx
        # would normally look for a literal file called "army" and
        # fail. This line says "if no matching file exists, just
        # serve index.html instead and let React handle the routing."
        try_files $uri $uri/ /index.html;
    }

    # Any request starting with /api/ gets forwarded to the backend
    # container instead of being treated as a static file request.
    # "backend" here is the SERVICE NAME we'll define in
    # docker-compose.yml — Docker automatically resolves that name
    # to the right container's internal address.
    location /api/ {
        proxy_pass http://backend:8080/api/;
    }

    location /reg {
        proxy_pass http://backend:8080/reg;
    }

    location /login {
        proxy_pass http://backend:8080/login;
    }
}